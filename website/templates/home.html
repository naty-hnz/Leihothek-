{% extends "layout.html" %}

{% block title %}Catalogus{% endblock %}

{% block content %}
<h1>Catalogus</h1>

<div class="catalogus">
{% for item in items %}
    <div class="item-card">
        <h2>{{ item.name }}</h2>
        <img src="{{ url_for('static', filename='images/' + item.image) }}">
        <p>{{ item.description }}</p>

        <a href="/item/{{ item.rfid }}">Bekijk</a>
    </div>
{% endfor %}
</div>
{% endblock %}
