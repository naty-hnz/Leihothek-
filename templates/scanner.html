{% extends "layout.html" %}

{% block title %}RFID Live{% endblock %}

{% block head %}
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
{% endblock %}

{% block content %}
    <h1>Wacht op scan...</h1>

    <script>
        const socket = io();

        socket.on('new_scan', function(data) {
            window.location.href = "/item/" + data.tag_id;
        });
    </script>
{% endblock %}
