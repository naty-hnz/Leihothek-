<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Catalogus</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1C1F26;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #88C0D0;
        }

        .catalogus {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .item-card {
            background-color: #2E3440;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .item-card:hover {
            transform: scale(1.03);
        }

        .item-card h2 {
            margin-top: 0;
            color: #88C0D0;
        }

        .item-card img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .item-card p {
            font-size: 14px;
            color: #ccc;
        }

        .item-card a {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background-color: #88C0D0;
            color: #1C1F26;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .item-card a:hover {
            background-color: #5e9fb5;
        }
    </style>
</head>
<body>

<h1>Catalogus</h1>

<div class="catalogus">
{% for item in items %}
    <div class="item-card">
        <h2>{{ item.name }}</h2>
        <img src="{{ url_for('static', filename='images/' + item.image) }}">
        <p>{{ item.description }}</p>

        <a href="/item/{{ item.rfid }}">Bekijk</a>
    </div>
{% endfor %}
</div>

</body>
</html>
